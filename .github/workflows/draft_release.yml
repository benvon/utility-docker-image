name: Draft Release

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  update_release_draft:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Publish GitHub Release for tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          # Treat semver pre-release tags (for example v1.2.3-rc.1) as prereleases.
          prerelease_args=()
          if [[ "${tag}" == *-* ]]; then
            prerelease_args+=(--prerelease --latest=false)
          else
            prerelease_args+=(--latest)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --draft=false "${prerelease_args[@]}"
          else
            gh release create "${tag}" --verify-tag --generate-notes "${prerelease_args[@]}"
          fi
